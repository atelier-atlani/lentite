charity_reconstruction:
  content: "L'argument principal peut être reconstruit ainsi : le projet gouvernemental\
    \ de réforme des retraites repose sur une logique jugée productiviste et inéquitable,\
    \ qui impose l'effort d'ajustement démographique aux catégories les plus précaires\
    \ plutôt que de redistribuer les gains de productivité accumulés. Face à ce choix,\
    \ une alternative est proposée : réduire davantage le temps de travail collectif\
    \ (semaine de 35h avec objectif de 32h, sixième semaine de congés payés) et permettre\
    \ un départ à la retraite à 60 ans avec 40 annuités, sur le fondement de deux\
    \ justifications distinctes : (1) une justification historique — au XXe siècle,\
    \ la productivité ayant été multipliée par 40 tandis que le temps de travail était\
    \ divisé par deux, il existerait une trajectoire attendue de conversion des gains\
    \ de productivité en temps libéré plutôt qu'en seul surcroît de production, trajectoire\
    \ que la réforme actuelle interromprait ; (2) une justification normative double,\
    \ à la fois sur le registre de la liberté individuelle (le temps hors travail\
    \ comme espace d'autodétermination, présenté comme une aspiration profonde et\
    \ non un simple déficit de communication gouvernementale à corriger) et sur le\
    \ registre écologique (la réduction du temps de travail comme réponse structurelle\
    \ à l'insoutenabilité du modèle productiviste face à la crise climatique, et non\
    \ seulement comme acquis social). L'impopularité de la réforme gouvernementale\
    \ serait ainsi le symptôme d'un décalage entre cette aspiration anthropologique\
    \ à l'autodétermination et un projet qui va dans le sens contraire de la trajectoire\
    \ historique attendue."
  borrowed_terms_handled:
  - term: logique productiviste, archaïque et injuste
    handling: quoted
  - term: insoutenable
    handling: quoted
  - term: aveuglement
    handling: quoted
  - term: où commencent le choix et la liberté
    handling: quoted
  - term: chaque être est profondément attaché à l'autodétermination dans l'organisation
      de sa vie
    handling: quoted
  - term: civilisation du temps libéré
    handling: quoted
