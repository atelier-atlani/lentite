charity_reconstruction:
  content: |
    La situation budgétaire et institutionnelle exige un gouvernement de fermeté qui prenne ses
    responsabilités face à la dégradation des comptes publics et à la fragmentation parlementaire
    post-dissolution. Doctrine économique - réduction de la double dette budgétaire et écologique.
    Deux tiers par réduction des dépenses, un tiers par contribution exceptionnelle. Sur les
    retraites, aménagements raisonnables sans procédure formalisée. Sur la sécurité et l'immigration,
    fermeté assumée. Méthode globale d'écoute respect dialogue, arbitrage de fond à droite.
  borrowed_terms_handled:
    - {term: "argent magique", handling: quoted}
    - {term: "tout gratuit", handling: attributed}
    - {term: "aménagements raisonnables et justes", handling: attributed}
    - {term: "double dette", handling: reformulated_neutral}
    - {term: "maîtrise de l'immigration", handling: attributed}

