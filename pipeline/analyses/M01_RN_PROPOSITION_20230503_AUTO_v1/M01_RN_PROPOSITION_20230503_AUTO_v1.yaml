    de l'opinion publique et sur la personnalisation présidentielle de la décision,
    mobilisé par une partie de l'opposition parlementaire (RN, Nupes) durant le mouvement
    social de 2023
  mobilization_type: thematic_explicit
  consensus_level_mobilized: contested
