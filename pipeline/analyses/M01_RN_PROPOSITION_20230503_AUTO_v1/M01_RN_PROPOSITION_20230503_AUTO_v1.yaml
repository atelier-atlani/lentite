charity_reconstruction:
  content: "Le groupe RN soutient que la réforme des retraites promulguée le 14 avril\
    \ 2023 devrait être remplacée par un dispositif alternatif, plus favorable selon\
    \ lui aux travailleurs ayant commencé leur carrière tôt, comportant un âge de\
    \ départ minimum de 60 ans pour les personnes ayant travaillé avant 20 ans, un\
    \ relèvement progressif jusqu'à 62 ans selon l'âge d'entrée dans la vie active,\
    \ et une durée de cotisation réduite (40 à 42 annuités contre 43 dans la loi en\
    \ vigueur). L'argument implicite est double : d'une part, la réforme adoptée serait\
    \ illégitime au plan procédural et démocratique parce qu'elle aurait été adoptée\
    \ en dépit d'une opposition majoritaire de l'opinion publique (« rejet de plus\
    \ de deux-tiers des citoyens ») et malgré un contexte parlementaire contesté (qualifiée\
    \ d'« imposée »); d'autre part, elle serait illégitime au plan substantiel parce\
    \ qu'elle produirait des effets jugés injustes (par exemple pour les carrières\
    \ longues) sans justification d'utilité suffisante (qualifiée d'« inutile »).\
    \ Le dépôt de la proposition de loi vise ainsi à offrir, dès à présent, une alternative\
    \ parlementaire concrète, tout en inscrivant cette alternative dans la continuité\
    \ du programme présidentiel de Marine Le Pen, avec l'intention déclarée de la\
    \ soumettre au vote du Parlement ou à référendum en cas d'élection de celle-ci\
    \ à la présidence de la République."
  borrowed_terms_handled:
  - term: injuste
    handling: quoted
  - term: inutile
    handling: quoted
  - term: imposée
    handling: quoted
  - term: rejet de plus de deux-tiers des citoyens
    handling: attributed
  - term: directement issue du programme de Marine Le Pen
    handling: quoted
