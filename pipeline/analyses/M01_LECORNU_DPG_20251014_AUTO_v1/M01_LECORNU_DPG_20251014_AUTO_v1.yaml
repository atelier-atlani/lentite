- unit_id: u7
  text_span: Comme je l'ai déjà annoncé, dans tous les cas de figure à la fin de la
    discussion budgétaire, ce déficit devra être à moins de 5% du PIB, car cet impératif
    de souveraineté s'impose à nous tous. Nous ne pouvons pas placer notre pays en
    dépendance durable de prêteurs étrangers et je ne serai pas le Premier ministre
    d'un dérapage des comptes publics.
  speech_acts:
  - engagement chiffré
  - justification
  - déclaration d'intention personnelle
  presuppositions:
  - Un déficit supérieur à 5% du PIB créerait une dépendance durable vis-à-vis de
    prêteurs étrangers.
  - Il existe un risque réel de 'dérapage des comptes publics' que le locuteur entend
    prévenir personnellement.
  argumentative_vulnerabilities:
  - type: appel à la peur / dramatisation non chiffrée du risque de dépendance
    level: possible
    evidence_span: Nous ne pouvons pas placer notre pays en dépendance durable de
      prêteurs étrangers
    confidence: 0.5
    confidence_applies_to: inference
    charitable_alternative: L'argument peut se lire comme un rappel légitime d'un
      risque macroéconomique réel (charge de la dette, notation souveraine) plutôt
      que comme une pure dramatisation rhétorique, sans que le texte fournisse de
      données chiffrées à l'appui.
