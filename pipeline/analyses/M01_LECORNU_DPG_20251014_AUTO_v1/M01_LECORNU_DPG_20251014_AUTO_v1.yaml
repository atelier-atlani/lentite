    handling: quoted
units:
- unit_id: u1
  text_span: Il faut savoir tirer les bienfaits d'une crise. J'ai accepté la mission
    que m'a confiée le Président de la République, parce que la France doit avoir
    un budget, parce qu'il y a des mesures d'urgence à prendre, sans attendre.
  speech_acts:
  - assertion
  - justification de l'acceptation d'un mandat
  presuppositions:
  - La France n'a pas actuellement de budget adopté.
  - Il existe des mesures d'urgence identifiées et non encore prises.
  argumentative_vulnerabilities:
  - type: présupposition non démontrée / pétition de principe implicite
    level: probable
    evidence_span: parce que la France doit avoir un budget, parce qu'il y a des mesures
      d'urgence à prendre, sans attendre
    confidence: 0.6
    confidence_applies_to: inference
    charitable_alternative: L'urgence budgétaire et l'absence de budget adopté sont
      des faits institutionnels vérifiables au moment du discours, non une simple
      affirmation rhétorique.
    hidden_premises:
    - L'acceptation de la mission est justifiée par la seule nécessité objective,
      sans mention d'un intérêt personnel ou partisan à l'accepter.
    defeaters: []
    date_fait: '2025-10-14'
    date_connaissance: '2025-10-14'
  omissions: []
  inferred_function: null
- unit_id: u2
  text_span: Certains aimeraient voir cette crise parlementaire virer à la crise de
    régime. Cela n'aura pas lieu, grâce aux institutions de la Cinquième République
    et à ses soutiens. Mais cette crise a des racines.
  speech_acts:
  - assertion
  - réfutation implicite d'une thèse adverse
  - promesse/garantie
  presuppositions:
  - Certains acteurs politiques souhaitent une crise de régime.
  - La Cinquième République dispose d'institutions et de soutiens capables d'empêcher
    une crise de régime.
  - La crise parlementaire actuelle a des causes profondes antérieures.
  argumentative_vulnerabilities:
  - type: homme de paille implicite (attribution d'intention à une cible non nommée)
    level: probable
    evidence_span: Certains aimeraient voir cette crise parlementaire virer à la crise
      de régime.
    confidence: 0.55
    confidence_applies_to: inference
    charitable_alternative: Il pourrait exister des acteurs politiques ayant effectivement
      exprimé publiquement une critique du régime lui-même, information non vérifiable
      dans le seul texte.
    hidden_premises:
    - Des acteurs identifiables souhaitent effectivement une crise de régime, et non
      simplement une critique institutionnelle légitime.
    defeaters:
    - Aucune citation ou source n'identifie qui souhaiterait une 'crise de régime'.
    - L'expression pourrait viser une position caricaturée n'ayant jamais été formulée
      ainsi par quiconque.
    date_fait: '2025-10-14'
    date_connaissance: '2025-10-14'
  - type: affirmation catégorique non étayée (garantie institutionnelle)
    level: possible
    evidence_span: Cela n'aura pas lieu, grâce aux institutions de la Cinquième République
      et à ses soutiens.
    confidence: 0.5
    confidence_applies_to: inference
    charitable_alternative: Le locuteur exprime une conviction politique sur la solidité
      institutionnelle plutôt qu'un fait démontré.
    hidden_premises:
    - Les institutions de la Cinquième République garantissent par elles-mêmes l'absence
      de crise de régime, indépendamment du contexte politique.
    defeaters: []
    date_fait: non_documente
    date_connaissance: non_documente
  omissions: []
  inferred_function: null
- unit_id: u3
  text_span: Nous vivons et nous vivrons dans une époque de crises. Soit on les subit,
    soit on les utilise. Soit on change, soit on sera changé. Le dégagisme c'est ça.
  speech_acts:
  - assertion
  - formulation d'une alternative dichotomique
  - avertissement
  presuppositions:
  - Il n'existe que deux attitudes possibles face aux crises.
  - Le refus de changer expose à un changement subi et négatif désigné comme 'dégagisme'.
  argumentative_vulnerabilities:
  - type: faux dilemme
    level: probable
    evidence_span: Soit on les subit, soit on les utilise. Soit on change, soit on
      sera changé.
    confidence: 0.65
    confidence_applies_to: inference
    charitable_alternative: Cette dichotomie peut être lue comme une formule rhétorique
      de mobilisation plutôt que comme une description exhaustive des attitudes possibles
      face à une crise, ce qui atténuerait le caractère fallacieux si le public la
      perçoit comme telle.
    hidden_premises:
    - Il n'existe aucune position intermédiaire ou alternative entre subir et utiliser
      une crise, ou entre changer et être changé.
    defeaters:
    - Des stratégies mixtes (adaptation partielle, résistance sélective, attente stratégique)
      constituent des alternatives non couvertes par la dichotomie proposée.
    date_fait: non_documente
    date_connaissance: non_documente
  - type: terme chargé non défini (glissement sémantique)
    level: possible
    evidence_span: Le dégagisme c'est ça.
    confidence: 0.5
    confidence_applies_to: hypothesis
    charitable_alternative: Le terme 'dégagisme' est employé de façon allusive pour
      désigner un phénomène politique déjà commenté dans le débat public, sans prétention
      à une définition rigoureuse dans ce contexte oratoire.
    hidden_premises:
    - Le refus de changer entraîne nécessairement le phénomène désigné par 'dégagisme',
      assimilant ainsi la sanction électorale à une conséquence mécanique du changement
      de monde.
    defeaters: []
    date_fait: non_documente
    date_connaissance: non_documente
  omissions: []
  inferred_function:
    label: Légitimer par avance le changement de posture du gouvernement en présentant
      l'immobilisme comme seul facteur de risque politique
    confidence: 0.55
    epistemic_regime: believes
    alternative_functions:
    - label: Avertissement sincère adressé à l'ensemble de la classe politique sans
        visée stratégique particulière
      confidence: 0.35
      epistemic_regime: asserts
- unit_id: u4
  text_span: Ceux qui ne changent pas, ceux qui s'agrippent aux vieux réflexes, aux
    postures, disparaîtront. En politique, comme en tout. En France, comme ailleurs.
    Le basculement du monde ne s'arrêtera pas.
  speech_acts:
  - prédiction
  - avertissement
  - généralisation
  presuppositions:
  - Il existe des acteurs politiques qui s'agrippent à de 'vieux réflexes' et des
    'postures'.
  - Un basculement du monde est en cours et est irréversible.
  argumentative_vulnerabilities:
  - type: généralisation non qualifiée / appel à l'inévitabilité (pente glissante
      douce)
    level: probable
    evidence_span: Le basculement du monde ne s'arrêtera pas.
    confidence: 0.6
    confidence_applies_to: inference
    charitable_alternative: Cette affirmation peut être comprise comme une évaluation
      prospective plausible des tendances géopolitiques et technologiques en cours
      plutôt qu'une loi historique certaine.
    hidden_premises:
    - Le processus décrit comme 'basculement du monde' est linéaire, irréversible
      et connaissable dans sa trajectoire future.
    defeaters:
    - Les trajectoires historiques et géopolitiques comportent des ruptures et retournements
      non prévisibles depuis le présent, ce qui affaiblit l'affirmation d'irréversibilité.
    - Aucune source ou donnée n'est fournie à l'appui de cette prédiction.
    date_fait: non_documente
    date_connaissance: non_documente
  - type: cible non identifiée (attaque générique sans nomination)
    level: possible
    evidence_span: Ceux qui ne changent pas, ceux qui s'agrippent aux vieux réflexes,
      aux postures, disparaîtront.
    confidence: 0.5
    confidence_applies_to: inference
    charitable_alternative: L'énoncé vise une posture générale plutôt que des personnes
      précises, ce qui relève d'un procédé oratoire classique et non d'une accusation
      trompeuse.
    hidden_premises:
    - Un groupe identifiable de personnes 's'agrippant aux vieux réflexes' existe
      réellement et correspond aux oppositions du locuteur.
    defeaters: []
    date_fait: non_documente
    date_connaissance: non_documente
  omissions: []
  inferred_function: null
- unit_id: u5
  text_span: J'avais renoncé à utiliser l'article 49 alinéa 3 de la Constitution.
    C'est la garantie pour l'Assemblée Nationale, que le débat, notamment budgétaire
    - mais pas seulement -, dans tous les domaines, vivra, ira jusqu'au bout. Jusqu'au
    vote.
  speech_acts:
  - annonce d'engagement
  - promesse
  - garantie
  presuppositions:
  - Le recours habituel au 49.3 empêchait le débat parlementaire d'aller jusqu'au
    vote.
  - Le renoncement au 49.3 est présenté comme acquis et non hypothétique.
  argumentative_vulnerabilities:
  - type: présupposition contestable présentée comme acquise
    level: probable
    evidence_span: C'est la garantie pour l'Assemblée Nationale, que le débat, notamment
      budgétaire - mais pas seulement -, dans tous les domaines, vivra, ira jusqu'au
      bout. Jusqu'au vote.
    confidence: 0.6
    confidence_applies_to: inference
    charitable_alternative: Le renoncement au 49.3 rend structurellement plus probable
      l'aboutissement des débats au vote, sans que cela constitue une garantie absolue
      et automatique en toutes circonstances (obstruction, motion de censure, etc.).
    hidden_premises:
    - L'absence de 49.3 suffit à elle seule à garantir que tout débat parlementaire
      ira jusqu'au vote, sans tenir compte d'autres blocages procéduraux possibles.
    defeaters:
    - Une motion de censure votée pourrait interrompre le processus budgétaire indépendamment
      du renoncement au 49.3.
    - L'absence d'accord en commission mixte paritaire ou l'obstruction parlementaire
      pourrait empêcher un vote final.
    date_fait: '2025-10-14'
    date_connaissance: '2025-10-14'
  omissions: []
  inferred_function: null
- unit_id: u6
  text_span: Le Gouvernement présente le budget qu'il estime souhaitable. Le Parlement
    l'examine, le discute, le modifie. C'est sa liberté. Et, sans 49.3, sans majorité
    absolue, le Parlement aura le dernier mot. C'est sa responsabilité et nous devons
    lui faire confiance
  speech_acts:
  - description d'une procédure
  - attribution de responsabilité
  - déclaration de confiance
  presuppositions:
  - Le Parlement n'avait pas auparavant le dernier mot sur le budget.
  - Faire confiance au Parlement est présenté comme un choix du gouvernement plutôt
    qu'une contrainte institutionnelle subie.
  argumentative_vulnerabilities:
  - type: cadrage favorable occultant une contrainte politique (choix présenté comme
      confiance plutôt que nécessité)
    level: possible
    evidence_span: C'est sa responsabilité et nous devons lui faire confiance
    confidence: 0.45
    confidence_applies_to: hypothesis
    charitable_alternative: Le renoncement au 49.3 découle à la fois d'une conviction
      institutionnelle et de l'absence de majorité absolue ; présenter cela comme
      un acte de confiance n'exclut pas la reconnaissance implicite de la contrainte
      politique, les deux motivations pouvant coexister sans contradiction.
    hidden_premises:
    - Faire confiance au Parlement sur le budget est un choix délibéré du gouvernement,
      indépendant du rapport de force parlementaire qui rend le 49.3 politiquement
      risqué.
    defeaters: []
    date_fait: non_documente
    date_connaissance: non_documente
  omissions:
