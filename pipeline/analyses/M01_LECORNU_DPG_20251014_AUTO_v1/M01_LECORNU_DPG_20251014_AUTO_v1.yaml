    institutionnel entre Parlement et Gouvernement, mobilisée via une citation attribuée
    à Michel Debré, père de la Constitution de 1958
  mobilization_type: thematic_explicit
  consensus_level_mobilized: strong_consensus
  competing: Lecture présidentialiste et parlementariste rationalisé de la Ve République,
    insistant sur la prééminence de l'exécutif et l'usage des outils constitutionnels
    (dont le 49.3) comme garants de la stabilité gouvernementale plutôt que comme
    contournement du débat parlementaire
  consensus_level_competing: strong_consensus
  what_competing_would_say: Cette lecture concurrente soutiendrait que le parlementarisme
    rationalisé, y compris l'usage du 49.3, constitue lui-même une forme légitime
    et historiquement fondée de fonctionnement démocratique sous la Ve République,
    et que son abandon fragilise la capacité gouvernementale à agir plutôt qu'il ne
    renforce la démocratie.
