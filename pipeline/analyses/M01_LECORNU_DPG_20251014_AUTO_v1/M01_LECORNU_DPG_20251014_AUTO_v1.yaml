      ayant rendu le recours au 49.3 politiquement périlleux (risque de censure),
      et non seulement une question de principe démocratique
    level: strategic_probable
    why_expected: Le locuteur reconnaît lui-même ailleurs dans le discours (unité
      sur la deuxième condition) l'absence de majorité et la fragilité de sa position,
      ce qui montre une conscience documentée de cette contrainte au moment du discours.
    evidence_of_expected_knowledge: Le Premier ministre évoque explicitement 'une
