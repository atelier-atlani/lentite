enonciation:
  speaker:
    id: lecornu_sebastien
    name: Sébastien Lecornu
    role_at_date: Premier ministre
  date: '2025-10-14'
  place: Assemblée nationale, Paris
  primary_audience: Députés et sénateurs (parlementaires)
  secondary_audiences:
  - Partenaires sociaux
  - Collectivités locales et élus locaux
  - Citoyens français
  - Prêteurs internationaux / marchés financiers
  - Journalistes et médias
  channel: Discours oral retransmis, séance plénière de l'Assemblée nationale
  political_sequence: Déclaration de politique générale dans un contexte de crise
    parlementaire et d'instabilité gouvernementale, sans majorité absolue à l'Assemblée
    nationale, quelques mois avant des élections municipales et à distance de l'élection
    présidentielle de 2027
  genre: Déclaration de politique générale (discours institutionnel solennel, article
    49 al.1 ou hors engagement de responsabilité)
  communication_contract: Genre codifié engageant le Premier ministre devant l'Assemblée
    à présenter le programme et les orientations du gouvernement, suivi d'un débat
    parlementaire ; ici doublé d'une promesse explicite de renoncement au 49.3 qui
    transforme le contrat en engagement de méthode parlementaire
  affective_charge: medium
  ethical_charge: medium
  thematic_objects:
  - object_id: obj_crise_multiple
    label: Les crises multiples (sociale, économique, financière, écologique, climatique,
      culturelle, internationale) et le changement de monde
    efficiency_status: efficient_partiel
    efficiency_justification: Le thème structure toute l'ouverture du discours et
      sert à justifier l'urgence d'agir, mais reste énuméré de façon générale sans
      développement spécifique de chaque crise citée, ce qui limite sa portée informative
      propre.
  - object_id: obj_budget
    label: Le budget de l'État et de la sécurité sociale, déficit public, fiscalité
    efficiency_status: efficient
    efficiency_justification: Le sujet est traité avec des chiffres précis (4,7% puis
      4,6% puis objectif de 5% puis 5,4% du PIB, montants de la CVAE, contribution
      sur les grandes fortunes) et rattaché à des mesures concrètes annoncées (projet
      de loi contre les fraudes, baisses et hausses d'impôts ciblées).
  - object_id: obj_49_3
    label: Renoncement à l'article 49 alinéa 3 de la Constitution et partage du pouvoir
      avec le Parlement
    efficiency_status: efficient
    efficiency_justification: L'engagement est formulé de façon claire et répétée
      ('Le Gouvernement proposera, nous débattrons, vous voterez'), avec citation
      de Michel Debré à l'appui et conséquences pratiques explicitées (le Parlement
      aura le dernier mot sur le budget).
  - object_id: obj_retraites
    label: Suspension de la réforme des retraites de 2023 et avenir du système de
      retraite
    efficiency_status: efficient
    efficiency_justification: Des mesures chiffrées et datées sont annoncées (suspension
      jusqu'à janvier 2028, coût de 400 millions en 2026 et 1,8 milliard en 2027,
      3,5 millions de bénéficiaires, maintien à 170 trimestres) ainsi qu'un dispositif
      institutionnel (Conférence sur les retraites et le travail).
  - object_id: obj_decentralisation
    label: Partage du pouvoir avec les collectivités locales et nouvel acte de décentralisation
    efficiency_status: efficient_partiel
    efficiency_justification: Un calendrier est donné (projet de loi en décembre)
      et un principe est énoncé (un seul responsable par politique publique), mais
      les modalités concrètes de transfert de compétences et de moyens ne sont pas
      précisées.
  - object_id: obj_outremer
    label: Nouvelle-Calédonie, Outre-mer, Corse
    efficiency_status: efficient_partiel
    efficiency_justification: Des échéances précises sont données pour la Nouvelle-Calédonie
      (consultation au printemps 2026, accord de Bougival) mais les projets de loi
      sur la vie chère et sur la Corse sont seulement annoncés comme 'prêts' sans
      contenu détaillé.
  - object_id: obj_urgences_diverses
    label: Urgences diverses (sécurité, immigration, éducation, santé, fin de vie,
      luttes contre discriminations)
    efficiency_status: non_efficient
    efficiency_justification: Ces sujets sont énumérés en fin de discours de façon
      très générale ('j'y reviendrai', 'les ministres y reviendront') sans aucune
      mesure, calendrier ou engagement concret formulé dans le texte.
  targeted_objects:
  - object_id: tgt_opposants_degagistes
    label: Ceux qui refusent le changement / tenants du 'dégagisme' et des 'vieux
      réflexes'
    inference_confidence: 0.7
    grounded_in:
    - Ceux qui ne changent pas, ceux qui s'agrippent aux vieux réflexes, aux postures,
      disparaîtront.
    - Le dégagisme c'est ça.
    efficiency_status: efficient_partiel
    efficiency_justification: La cible est nommée par une étiquette ('dégagisme')
      mais reste une catégorie générale non identifiée nommément, ce qui limite la
      précision de la visée tout en produisant un effet rhétorique net de mise en
      garde.
  - object_id: tgt_partis_opposition
    label: Les oppositions parlementaires et 'certains' souhaitant transformer la
      crise parlementaire en crise de régime
    inference_confidence: 0.65
    grounded_in:
    - Certains aimeraient voir cette crise parlementaire virer à la crise de régime.
      Cela n'aura pas lieu, grâce aux institutions de la Cinquième République et à
      ses soutiens.
    - J'ai pris des engagements, ceux que les oppositions demandaient.
    efficiency_status: efficient_partiel
    efficiency_justification: La cible est désignée de façon allusive ('certains',
      'les oppositions') sans nomination explicite de partis, ce qui atténue la force
      de l'accusation tout en la rendant compréhensible par contexte.
  - object_id: tgt_grandes_fortunes
    label: Les très grandes fortunes et l'optimisation fiscale via les holdings
    inference_confidence: 0.85
    grounded_in:
    - La fiscalité des très grandes fortunes, parmi nos compatriotes, a pu interpeller
      un certain nombre d'entre vous.
    - Encadrer l'optimisation fiscale – en particulier celle qui passe par les holdings
      - est une première réponse.
    - Nous demanderons à créer une contribution exceptionnelle des grandes fortunes
    efficiency_status: efficient
    efficiency_justification: La cible est nommément désignée et fait l'objet d'une
      mesure fiscale précise annoncée (contribution exceptionnelle), avec justification
      explicite liée au consentement à l'impôt.
  - object_id: tgt_fraudeurs
    label: Les fraudeurs sociaux et fiscaux
    inference_confidence: 0.85
    grounded_in:
    - D'autres économies seront engagées en luttant plus rigoureusement contre les
      fraudes, qu'elles soient sociales ou fiscales.
    - Un projet de loi contre les fraudes a été déposé ce matin
    efficiency_status: efficient
    efficiency_justification: La cible est clairement identifiée et associée à une
      mesure concrète et datée (dépôt d'un projet de loi le jour même du discours).
  - object_id: tgt_predecesseur_bercy
    label: La pratique antérieure du pouvoir centrée sur Bercy / l'exécutif au détriment
      du Parlement
    inference_confidence: 0.55
    grounded_in:
    - La loi se fera ici, pas à Bercy.
    - J'avais renoncé à utiliser l'article 49 alinéa 3 de la Constitution.
    efficiency_status: efficient_partiel
    efficiency_justification: La critique implicite d'une pratique antérieure de gouvernance
      est perceptible par contraste mais aucun gouvernement ou personne précédente
      n'est nommément visé, ce qui rend la cible identifiable seulement par inférence
      contextuelle.
charity_reconstruction:
  content: "L'argument principal du Premier ministre peut se reconstruire ainsi :\
    \ la France traverse une période de crises multiples et durables (budgétaire,\
    \ sociale, géopolitique, mais aussi une mutation de civilisation comparable à\
    \ la révolution industrielle) qui rend caduques les pratiques de gouvernement\
    \ antérieures fondées sur l'usage systématique du 49.3 et la centralisation de\
    \ la décision. Face à une Assemblée nationale sans majorité absolue mais représentative\
    \ de la diversité réelle du pays, la seule voie soutenable pour produire un budget\
    \ et des réformes légitimes consiste à partager effectivement le pouvoir de décision\
    \ avec le Parlement (renoncement au 49.3, débat et vote réels sur le budget),\
    \ avec les partenaires sociaux (suspension temporaire et négociée de la réforme\
    \ des retraites, conférence sociale) et avec les collectivités locales (acte de\
    \ décentralisation, principe d'un responsable identifié par politique publique).\
    \ Cette méthode, bien que plus lente et incertaine dans ses résultats qu'un exercice\
    \ solitaire du pouvoir exécutif, est présentée comme la condition nécessaire pour\
    \ restaurer la confiance démocratique, éviter le blocage institutionnel, et parvenir\
    \ malgré tout à des compromis budgétaires et sociaux tenables, sous la contrainte\
    \ explicite de ne pas aggraver le déficit ni la dépendance de la France à des\
    \ prêteurs étrangers."
