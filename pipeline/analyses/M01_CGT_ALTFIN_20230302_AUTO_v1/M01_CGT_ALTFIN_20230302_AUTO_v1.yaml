charity_reconstruction:
  content: "L'argument principal de la CGT peut être reconstruit ainsi : le système\
    \ de retraites par répartition ne souffre pas d'un déficit structurel insurmontable\
    \ qui imposerait mécaniquement un allongement de la durée de cotisation ou un\
    \ report de l'âge de départ ; le véritable problème, selon la CGT, est une insuffisance\
    \ de recettes résultant de choix de politique économique et sociale antérieurs\
    \ (stagnation salariale, exonérations de cotisations, faible taxation du capital,\
    \ non-cotisation de certaines formes de rémunération). Dès lors, il existe des\
    \ leviers alternatifs de financement, mobilisables sans dégrader les droits des\
    \ assurés : augmenter les salaires et l'emploi (ce qui accroît mécaniquement les\
    \ cotisations), supprimer ou réduire les exonérations patronales, taxer davantage\
    \ les dividendes, élargir l'assiette de cotisation à des formes de rémunération\
    \ aujourd'hui exonérées, augmenter légèrement le taux de cotisation, et mobiliser\
    \ les excédents actuels de la Sécurité sociale. La CGT ne nie pas qu'un déficit\
    \ soit projeté à l'horizon 2030 (elle le chiffre elle-même à 12 Md€ couvrable\
    \ par 0,8 point de cotisation supplémentaire) ; elle conteste en revanche l'urgence\
    \ et la nature du problème tel que présenté par ailleurs, ainsi que le choix de\
    \ la seule variable d'ajustement retenue (durée/âge), en avançant que d'autres\
    \ arbitrages redistributifs permettraient de financer le système sans réduire\
    \ les pensions relativement aux salaires."
  borrowed_terms_handled:
  - term: problème de financement immédiat
    handling: quoted
  - term: les pensions sont amenées à diminuer par rapport aux salaires si l'on n'améliore
      pas le système
    handling: quoted
  - term: autre réforme
    handling: quoted
  - term: manque à gagner
    handling: attributed
