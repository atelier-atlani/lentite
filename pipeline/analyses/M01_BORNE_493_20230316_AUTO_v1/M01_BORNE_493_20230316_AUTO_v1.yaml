charity_reconstruction:
  content: "L'argument principal de la Première ministre peut être reconstruit ainsi\
    \ : (1) une concertation approfondie et prolongée a eu lieu depuis l'automne avec\
    \ les partenaires sociaux et les parlementaires, engagement pris devant l'Assemblée\
    \ lors de sa déclaration de politique générale ; (2) cette concertation a permis\
    \ d'aboutir, via la commission mixte paritaire composée de sensibilités parlementaires\
    \ diverses où la majorité gouvernementale n'est pas majoritaire, à un compromis\
    \ qui n'est plus le projet initial du Gouvernement mais le texte du Parlement,\
    \ déjà adopté par le Sénat ; (3) ce compromis est fragile et son adoption par\
    \ un vote à l'Assemblée est incertaine (« à quelques voix près ») ; (4) le risque\
    \ politique de voir ce compromis parlementaire rejeté ou les 175 heures de débat\
    \ rendues vaines est jugé par la locutrice supérieur au risque démocratique de\
    \ recourir à une procédure sans vote ; (5) elle en conclut, en invoquant à la\
    \ fois son attachement au modèle social et sa foi dans la démocratie parlementaire\
    \ (dont la CMP serait une expression), la nécessité d'engager la responsabilité\
    \ du Gouvernement sur ce texte plutôt que de le soumettre à un vote dont l'issue\
    \ est incertaine. La citation de Rocard sert à appuyer l'idée qu'une majorité\
    \ de conscience, distincte d'une majorité de vote effectif, existerait en faveur\
    \ du texte. Cette reconstruction restitue la logique interne de l'argument (compromis\
    \ parlementaire fragile + risque d'échec + valeur du contenu du texte justifieraient\
    \ le contournement du vote) sans en préjuger la validité, qui relève de l'étape\
    \ suivante du pipeline."
  borrowed_terms_handled:
