  - concéder un désaccord partiel personnel avec le compromis
  - attribuer la paternité du texte au Parlement plutôt qu'au Gouvernement
  presuppositions:
  - La composition plurielle de la CMP et la non-majorité gouvernementale en son sein
    suffisent à établir la légitimité démocratique du compromis obtenu
  - Le fait que le compromis ne soit « pas le projet du Gouvernement » renforce sa
    légitimité et son acceptabilité pour l'Assemblée
  - L'adoption au Sénat ce matin constitue un argument d'autorité pertinent pour l'Assemblée
