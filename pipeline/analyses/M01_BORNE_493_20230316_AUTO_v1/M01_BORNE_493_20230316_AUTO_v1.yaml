    handling: reformulated_neutral
  - term: coconstruction parlementaire
    handling: quoted
  - term: réforme enrichie, améliorée, mais toujours équilibrée
    handling: quoted
  - term: nécessaire
    handling: attributed
  - term: démocratie parlementaire
    handling: quoted
  - term: attachée à notre modèle social
    handling: attributed
units:
- unit_id: u1
  text_span: "« Dans un scrutin où chacun voterait selon sa conscience, permettez-moi\
    \ de dire que je suis sûr que ces dispositions réuniraient une majorité, peut-être\
    \ même une large majorité. » Elle ajoute : « Ces mots, aujourd'hui, je les fais\
    \ miens. »"
  speech_acts:
  - citer (acte rapporté d'un tiers, Rocard 1990)
  - s'approprier/endosser (« je les fais miens »)
  - affirmer implicitement l'existence d'une majorité de conscience favorable
  presuppositions:
  - Il existe une différence pertinente entre un vote de conscience hypothétique et
    le vote parlementaire réel
  - La situation de 1990 (CSG, Rocard) est suffisamment analogue à la situation présente
    (retraites, 2023) pour que la citation soit pertinente
  - Les mots de Rocard, prononcés dans un autre contexte, peuvent être valablement
    transposés à la présente réforme
  argumentative_vulnerabilities:
  - type: fausse analogie / transposition abusive d'un précédent historique
    level: probable
    evidence_span: « Dans un scrutin où chacun voterait selon sa conscience... » /
      « Ces mots, aujourd'hui, je les fais miens. »
    confidence: 0.65
    confidence_applies_to: inference
    charitable_alternative: La citation peut viser simplement à évoquer un précédent
      rhétorique connu de recours à une procédure similaire, sans prétendre à une
      analogie de fond stricte entre les deux réformes.
    hidden_premises:
    - Le contexte politique et social de 1990 (CSG) est suffisamment comparable à
      celui de 2023 (retraites) pour que l'argument de Rocard s'applique
    - Une majorité de conscience hypothétique équivaut à une légitimité démocratique
      suffisante
    defeaters:
    - La CSG et la réforme des retraites de 2023 diffèrent fortement en termes de
      contexte parlementaire, de mobilisation sociale et de rapport de force politique
    - Rien dans le texte ne permet de vérifier que la majorité de conscience invoquée
      par Rocard en 1990 s'est confirmée empiriquement, ce qui affaiblit la valeur
      du précédent
    date_fait: '1990-11-15'
    date_connaissance: '2023-03-16'
  - type: affirmation invérifiable présentée comme certitude (majorité de conscience
      hypothétique)
    level: possible
    evidence_span: « je suis sûr que ces dispositions réuniraient une majorité, peut-être
      même une large majorité »
