- unit_id: u5
  text_span: « Aujourd'hui, sur le texte du Parlement, l'incertitude plane, à quelques
    voix près. On ne peut pas prendre le risque de voir 175 heures de débats parlementaires
    anéanties. […] On ne peut pas prendre le risque de voir le compromis, bâti par
    les deux assemblées, écarté. […] On ne peut pas faire de pari sur l'avenir de
    nos retraites. Cette réforme est nécessaire. »
  speech_acts:
  - affirmer l'existence d'un risque d'échec du vote
  - justifier le recours à une procédure évitant le vote par le risque décrit
  - affirmer la nécessité de la réforme (jugement de valeur présenté comme un fait)
  presuppositions:
  - L'issue incertaine d'un vote constitue en soi une raison suffisante pour éviter
    ce vote plutôt que de le tenir
  - Les « 175 heures de débats parlementaires » seraient rendues vaines par un rejet,
    plutôt que d'avoir rempli leur fonction démocratique même en cas de rejet
  - La nécessité de la réforme est un fait établi et non un jugement de valeur à débattre
    davantage
  argumentative_vulnerabilities:
  - type: faux dilemme (vote incertain vs. procédure sans vote, sans exploration d'alternatives)
    level: probable
    evidence_span: « l'incertitude plane, à quelques voix près. On ne peut pas prendre
      le risque de voir 175 heures de débats parlementaires anéanties »
    confidence: 0.7
    confidence_applies_to: inference
    charitable_alternative: L'argument peut être compris comme une pesée de risques
      politiques légitime dans un contexte d'urgence perçue, sans prétendre nécessairement
      qu'aucune autre option n'existait.
    hidden_premises:
    - Il n'existait pas d'alternative praticable entre tenir le vote avec son incertitude
      et recourir au 49.3
    - Un rejet du texte par un vote légitime constitue un échec à éviter plutôt qu'un
      résultat démocratique normal du processus parlementaire
    defeaters:
    - Le règlement de l'Assemblée et la Constitution offrent d'autres voies procédurales
