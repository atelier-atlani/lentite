charity_reconstruction:
  content: |
    La situation politique post-censure Barnier exige une méthode de gouvernement minoritaire
    qui sorte de la confrontation frontale. La réforme des retraites de 2023 n'est pas remise
    en cause dans son principe, mais la controverse sur ses fondements financiers justifie un
    état des lieux indiscutable - d'où la mission flash de la Cour des comptes. Sur cette base,
    un conclave entre partenaires sociaux doit permettre d'identifier des améliorations possibles
    sans dégrader l'équilibre financier. La méthode privilégie la concertation procédurale sur
    les concessions substantielles. L'effort budgétaire est maintenu mais aménagé.
  borrowed_terms_handled:
    - {term: "précarité budgétaire", handling: quoted}
    - {term: "intérêt général", handling: attributed}
    - {term: "déficit caché", handling: quoted}

