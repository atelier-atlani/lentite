charity_reconstruction:
  content: |
    L'Assemblée nationale issue de la dissolution de juin 2024 est fragmentée — aucun bloc
    politique n'a la majorité absolue, et les compromis stables sont difficiles. La poursuite
    de cette trajectoire mènerait à la paralysie budgétaire et institutionnelle. Le rôle d'un
    gouvernement de mission est de proposer des concessions méthodologiques (renonciation au 49.3,
    ouverture au débat parlementaire) et substantielles (suspension de la réforme des retraites
    jusqu'en 2028) suffisantes pour permettre une stabilité minimale jusqu'à l'élection présidentielle,
    sans pour autant renoncer aux exigences de fond (maîtrise de la dépense publique, déficit sous 5%).
  borrowed_terms_handled:
    - term: "rupture"
      handling: attributed
    - term: "ouverture"
      handling: attributed

