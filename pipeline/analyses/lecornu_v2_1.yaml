discourse_action_gaps_on_thematic_objects:
  - thematic_object_id: OT1
    declared: "suspension de la réforme des retraites de 2023 jusqu'à janvier 2028"
    pattern_type: observed_as_announced
    observation_window: "octobre - novembre 2025"
    observation: "suspension votée le 12 novembre 2025 par 255 voix pour 146 contre. PLFSS 2026 adopté décembre 2025 avec la mesure intégrée. Bénéficiaires : 3,5 millions de Français des générations 1964-1968."
    source_reference: "vote AN 12 novembre 2025"
  - thematic_object_id: OT2
    declared: "renoncement à l'article 49.3 sur le budget 2026"
    pattern_type: broken_explicitly
    observation_window: "octobre 2025 - février 2026"
    observation: "PLFSS 2026 adopté sans 49.3 en décembre 2025 (engagement initialement tenu). PLF 2026 adopté par 49.3 le 19 janvier 2026 — engagement rompu publiquement. Trois recours au 49.3 (recettes, dépenses, ensemble) en janvier-février 2026. Budget 2026 finalement adopté en février 2026 par cette voie."
    public_motivation_invoked: "Lecornu a annoncé le 19 janvier 2026 engager la responsabilité du gouvernement après 350 heures de débat parlementaire, invoquant l'impossibilité de faire voter le budget par majorité. Citation du PM : 'force est de constater [...] que le calendrier n'a pas été complètement respecté'. La motion de censure de gauche déposée en réaction a été rejetée en manquant de 19 voix."
    source_reference: "Conseil des ministres 19 janvier 2026, info.gouv.fr"
  - thematic_object_id: OT3
    declared: "programme de méthode — gouvernement de mission, partage du pouvoir avec le Parlement"
    pattern_type: partially_observed
    observation_window: "octobre 2025 - mai 2026"
    observation: "méthode appliquée pour PLFSS 2026 (débat parlementaire, compromis avec PS, adoption par vote). Méthode contredite pour PLF 2026 (49.3, fermeture du débat). Le programme de méthode a tenu partiellement et a été révisé sous contrainte."

