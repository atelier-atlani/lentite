charity_reconstruction:
  content: |
    La séquence politique d'octobre 2025 confirme l'épuisement du second mandat d'Emmanuel Macron.
    La nomination de Sébastien Lecornu, démissionnaire huit jours plus tôt, comme Premier ministre
    à nouveau, illustre l'impasse institutionnelle du présidentialisme actuel. Le gouvernement
    Lecornu II propose une suspension de la réforme des retraites qui n'est qu'un "leurre" — la
    réforme reprendrait son cours en 2028. La voie de sortie démocratique passe par la censure
    immédiate du gouvernement, le vote d'une loi spéciale pour reconduire les budgets, puis la
    démission ou la destitution du Président. La France insoumise est la seule force politique
    cohérente sur cette ligne de rupture.
  borrowed_terms_handled:
    - term: "rupture totale"
      handling: quoted
    - term: "leurre"
      handling: quoted
    - term: "président aux abois"
      handling: attributed
    - term: "résistance populaire"
      handling: attributed

