charity_reconstruction:
  content: |
    Le Conseil constitutionnel est une juridiction qui se prononce en droit sur la
    constitutionnalité des lois qui lui sont déférées. Il n'est ni un organe consultatif
    de l'opinion publique ni une instance d'appel des choix politiques du Parlement.
    Les contestations qui ont entouré ses décisions de 2023 témoignent d'une confusion
    entre le rôle de la juridiction constitutionnelle et le débat politique sur l'opportunité
    des lois. La formule attribuée à Robert Badinter exprime ce partage des compétences
    avec précision — une loi peut être politiquement contestable sans être inconstitutionnelle.
  borrowed_terms_handled:
    - term: "martingale des refus"
      handling: attributed

