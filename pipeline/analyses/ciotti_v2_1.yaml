charity_reconstruction:
  content: |
    Le gouvernement Lecornu II illustre une crise politique inédite sous la Vème République,
    dont les responsabilités sont à chercher dans la pratique macroniste depuis 2017. Le bilan
    macroniste comporte des éléments substantiels et documentables qui constituent la base
    objective du diagnostic critique. La pratique politique contemporaine, qui maintient un
    gouvernement minoritaire par compromis tactiques avec une fraction du PS, contredit
    ce que le locuteur considère comme l'esprit originel de la Vème République.
  borrowed_terms_handled:
