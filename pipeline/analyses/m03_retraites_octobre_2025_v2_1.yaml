cross_matrix_salient_cases:
  - type: tactical_coalition
    actors_involved: [ERIC_CIOTTI, "frondeurs_PS"]
    description: "Convergence sur OV_F (fragilisation gouvernement) entre Ciotti-UDR-RN et 5-8 députés PS frondeurs, malgré divergence frontale sur P1, P2, P3, P5"
    analytical_reading: "Coalition de circonstance par convergence d'objet visé, pas par convergence doctrinale. Révélée par le vote conjoint sur la motion du 16 octobre."
  - type: unanticipated_convergence
    actors_involved: [SEBASTIEN_LECORNU, BORIS_VALLAUD]
    description: "Convergence sur OV_E (alliance CFDT) non explicitée — Lecornu reprend la formule CFDT dans la DPG, Vallaud revendique la victoire syndicale"
    analytical_reading: "La doctrine paritariste française fonctionne comme pivot transversal aux clivages politiques classiques. La CFDT légitime le compromis pour les deux camps."
  - type: convergence_proposition_divergence_aim
    actors_involved: [SEBASTIEN_LECORNU, BORIS_VALLAUD]
    description: "Convergence sur P1 (suspension adéquate) avec divergence sur objets visés — Lecornu vise OV_A + OV_G, Vallaud vise OV_D + OV_E"
    analytical_reading: "L'accord apparent sur la proposition masque des intérêts stratégiques entièrement divergents."
  - type: convergence_aim_divergence_proposition
    actors_involved: [SEBASTIEN_LECORNU, BORIS_VALLAUD]
    description: "Convergence sur OV_E avec divergence sur P3 (légitimité gouvernement)"
    analytical_reading: "Le compromis tactique sur l'alliance syndicale n'efface pas la divergence sur la légitimité institutionnelle."

