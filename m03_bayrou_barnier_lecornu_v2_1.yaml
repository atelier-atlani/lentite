cross_matrix_salient_cases:
  - type: convergence_proposition_divergence_aim
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Divergence frontale sur P1 méthode retraites avec convergence sur objet visé OV_F CFDT pivot - Barnier-Bayrou refusent suspension, Lecornu l'annonce, mais les trois mobilisent paritarisme syndical"
    analytical_reading: "La doctrine paritariste est compatible avec plusieurs stratégies méthodologiques distinctes. CFDT pivot transversal flexible dans son mode d'engagement."
  - type: unanticipated_convergence
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Pattern transversal de corrélation inverse concession-durée confirmé sur trois cas - Barnier 0 concession substantive 3 mois, Bayrou procédural 9 mois, Lecornu substantiel 7+ mois"
    analytical_reading: "La concession substantielle au PS pivot est condition nécessaire pour pérenniser gouvernement minoritaire à terme moyen dans la séquence française 2024-2026."
  - type: convergence_aim_divergence_proposition
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Typologie ternaire des stratégies de PM minoritaire émergente - frontalité substantive (Barnier), procéduralisation (Bayrou), concession substantielle (Lecornu)"
    analytical_reading: "Trois stratégies distinctes documentées empiriquement. Chaque PM successif apprend de la chute du précédent - processus d'apprentissage adaptatif sous contrainte parlementaire constante."
  - type: unanticipated_convergence
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Convergence non assumée sur OV_F entre méthodes opposées sur P1 - les trois PM mobilisent CFDT comme pivot transversal de légitimation malgré méthodes opposées"
    analytical_reading: "Convergence non assumée par les PM eux-mêmes (chacun présente sa méthode comme distincte et supérieure) mais opérationnellement active dans la trajectoire."
  - type: tactical_coalition
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Pattern de transmission d'objet thématique entre PM (observed_by_other_actor) - engagement Barnier OT2 transmis transformé par Bayrou (conclave), engagement Bayrou OT1 court-circuité par Lecornu (suspension)"
    analytical_reading: "Premier cas dans corpus M01 où pattern documenté à trois niveaux successifs. Transmission inter-PM avec transformation méthodologique."
  - type: convergence_aim_divergence_proposition
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Asymétrie d'efficience sur OV_E selon degré concession - Barnier non_efficient (convergence PS-RN censure), Bayrou efficient_partiel (PS non-censure 8 mois puis sortie), Lecornu efficient (suspension votée 255 voix)"
    analytical_reading: "L'efficience sur l'objet visé central de la séquence est strictement corrélée au degré de concession méthodologique."
  - type: unanticipated_convergence
    actors_involved: [MICHEL_BARNIER, FRANCOIS_BAYROU, SEBASTIEN_LECORNU]
    description: "Distinction analytique candidate - mobilisation déclarative (Barnier) / procédurale (Bayrou) / court-circuit législatif (Lecornu) du cadre paritariste"
    analytical_reading: "Trois modes d'actualisation du même cadre. Enrichissement de la découverte 3.2 du journal - la flexibilité d'actualisation est plus grande que documentée."

